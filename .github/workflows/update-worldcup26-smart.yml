name: Update World Cup Data (Smart Schedule)

on:
  schedule:
    # Runs every 5 minutes during match windows (from kickoff until 2 hours after)
  - cron: '*/5 12-20 15 6 *'  # 2026-06-15
  - cron: '*/5 15-23 16 6 *'  # 2026-06-16
  - cron: '*/5 12-22 17 6 *'  # 2026-06-17
  - cron: '*/5 12-21 18 6 *'  # 2026-06-18
  - cron: '*/5 12-23 19 6 *'  # 2026-06-19
  - cron: '*/5 12-23 20 6 *'  # 2026-06-20 part 1
  - cron: '*/5 0-0 21 6 *'  # 2026-06-20 part 2
  - cron: '*/5 12-20 21 6 *'  # 2026-06-21
  - cron: '*/5 12-22 22 6 *'  # 2026-06-22
  - cron: '*/5 12-22 23 6 *'  # 2026-06-23
  - cron: '*/5 12-21 24 6 *'  # 2026-06-24
  - cron: '*/5 16-21 25 6 *'  # 2026-06-25
  - cron: '*/5 15-22 26 6 *'  # 2026-06-26
  - cron: '*/5 17-23 27 6 *'  # 2026-06-27
  - cron: '*/5 12-14 28 6 *'  # 2026-06-28
  - cron: '*/5 12-21 29 6 *'  # 2026-06-29
  - cron: '*/5 12-21 30 6 *'  # 2026-06-30
  - cron: '*/5 12-19 1 7 *'  # 2026-07-01
  - cron: '*/5 12-22 2 7 *'  # 2026-07-02
  - cron: '*/5 13-22 3 7 *'  # 2026-07-03
  - cron: '*/5 12-19 4 7 *'  # 2026-07-04
  - cron: '*/5 16-20 5 7 *'  # 2026-07-05
  - cron: '*/5 14-19 6 7 *'  # 2026-07-06
  - cron: '*/5 12-15 7 7 *'  # 2026-07-07
  - cron: '*/5 16-18 9 7 *'  # 2026-07-09
  - cron: '*/5 12-14 10 7 *'  # 2026-07-10
  - cron: '*/5 17-22 11 7 *'  # 2026-07-11
  - cron: '*/5 14-16 14 7 *'  # 2026-07-14
  - cron: '*/5 15-17 15 7 *'  # 2026-07-15
  - cron: '*/5 17-19 18 7 *'  # 2026-07-18
  - cron: '*/5 15-17 19 7 *'  # 2026-07-19
  workflow_dispatch:  # Allow manual trigger

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      
      - name: Install dependencies
        run: |
          pip install requests
      
      - name: Run scraper
        run: |
          python scrape-worldcup26.py
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add data/worldcup-data.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update World Cup data [automated]" && git push)
